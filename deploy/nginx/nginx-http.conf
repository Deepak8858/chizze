# ══════════════════════════════════════════
# Chizze Nginx — HTTP Only (fallback)
# Used when SSL certificate is not yet available
# ══════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;

# Upstream — Go API servers
upstream chizze_api {
    least_conn;
    server api:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    server_name api.devdeepak.me 165.232.177.81;

    # ACME challenge for future SSL setup
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 5M;

    # Health check (no rate limit)
    location /health {
        proxy_pass http://chizze_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # Auth endpoints (strict rate limit)
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://chizze_api;
        include /etc/nginx/proxy_params.conf;
    }

    # WebSocket
    location /api/v1/ws {
        proxy_pass http://chizze_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API routes
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://chizze_api;
        include /etc/nginx/proxy_params.conf;
    }

    location / {
        return 404;
    }
}
