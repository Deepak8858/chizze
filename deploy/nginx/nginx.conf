# ══════════════════════════════════════════
# Chizze Nginx Reverse Proxy
# Production configuration
# ══════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=5r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream — Go API servers
upstream chizze_api {
    least_conn;
    server api:8080 max_fails=3 fail_timeout=30s;
    # Add more backend nodes here for horizontal scaling:
    # server api-2:8080 max_fails=3 fail_timeout=30s;
    # server api-3:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.devdeepak.me;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name api.devdeepak.me;

    # ─── SSL Configuration ───
    ssl_certificate     /etc/nginx/ssl/live/api.devdeepak.me/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.devdeepak.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── OCSP Stapling ───
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ───
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://sgp.cloud.appwrite.io wss://sgp.cloud.appwrite.io" always;

    # ─── Connection limits ───
    limit_conn addr 50;

    # ─── Request size ───
    client_max_body_size 5M;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # ─── Logging ───
    access_log /var/log/nginx/chizze_access.log;
    error_log  /var/log/nginx/chizze_error.log warn;

    # ─── Android App Links (Digital Asset Links) ───
    location /.well-known/assetlinks.json {
        default_type application/json;
        return 200 '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.chizze.app","sha256_cert_fingerprints":["39:06:7D:79:C3:8C:AA:E4:76:90:07:9A:D3:D9:B6:2F:3C:54:0B:5B:2B:2C:AA:86:0B:64:D4:F6:A7:27:F1:41"]}}]';
    }

    # ─── Health check (no rate limit) ───
    location /health {
        proxy_pass http://chizze_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Auth endpoints (strict rate limit) ───
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://chizze_api;
        include /etc/nginx/proxy_params.conf;
    }

    # ─── WebSocket upgrade ───
    location /api/v1/ws {
        proxy_pass http://chizze_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── API routes (standard rate limit) ───
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://chizze_api;
        include /etc/nginx/proxy_params.conf;
    }

    # ─── Block everything else ───
    location / {
        return 404;
    }
}
