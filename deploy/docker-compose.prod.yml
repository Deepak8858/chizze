# ══════════════════════════════════════════
# Chizze — Production Docker Compose
# ══════════════════════════════════════════
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
# ══════════════════════════════════════════

services:
  # ─── Nginx Reverse Proxy + SSL ───
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - frontend

  # ─── Go API Server ───
  api:
    image: ${DOCKER_IMAGE:-chizze-api:latest}
    build:
      context: ./backend
      args:
        VERSION: ${APP_VERSION:-latest}
    env_file:
      - .env.prod
    environment:
      - GIN_MODE=release
      - PORT=8080
    expose:
      - "8080"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"
        reservations:
          memory: 128M
          cpus: "0.5"
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
      - frontend

  # ─── Certbot (SSL certificate renewal) ───
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - frontend

  # ─── Redis (Docker-internal — disabled, using external Redis) ───
  # Uncomment to use Docker-internal Redis instead of external.
  # Also update .env.prod REDIS_URL to point to redis:6379.
  # redis:
  #   image: redis:7-alpine
  #   command: >
  #     redis-server
  #     --maxmemory 512mb
  #     --maxmemory-policy allkeys-lru
  #     --appendonly yes
  #     --appendfsync everysec
  #     --requirepass ${REDIS_PASSWORD}
  #   volumes:
  #     - redis_data:/data
  #   expose:
  #     - "6379"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
  #   networks:
  #     - backend

volumes:
  redis_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
